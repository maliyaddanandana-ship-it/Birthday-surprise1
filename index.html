</head>
<body>

    <div id="login">
        <h2>ආදරණීය, මේක ඔයා වෙනුවෙන්මයි! ❤️</h2>
        <input type="password" id="password" placeholder="මුරපදය ඇතුළත් කරන්න">
        <button onclick="checkPassword()">Open</button>
    </div>
    <div id="content" style="display:none;" class="container">
    <h1>Happy Birthday My Love! 🎂</h1>
    
    <img src="IMG_20260528_030835_031304_edit_524787509273894.jpg" alt="Photo">
    <img src="download (2).jpeg" alt="Photo">
    <img src="IMG-20260610-WA0012.jpg" alt="Photo">

    <img src="Screenshot_20260614_210708_com_hihonor_photos_SlotAlbumActivity_edit_1477255148563049.jpg" alt="Photo">
    <img src="IMG_20260618_100540.jpg" alt="IMG_20260618_100540.jpg"        
   <img src="IMG_20260618_100540.jpg" alt="IMG_20260618_100540.jpg.jpg" >

    <img src="IMG_20260618_100555.jpg" alt="IMG_20260618_100555.jpg" >

    <p style="color: #ff4757; font-weight: bold;">මේ video එක අනිවාර්යයෙන්ම නරඹන්න!</p>

    <h3>මෙන්න ඔයාට පොඩි තෑග්ගක්!</h3>
    <input type="text" id="phone" placeholder="ඔයාගේ දුරකථන අංකය">
    <button onclick="sendReload()">Reload ලබාගන්න</button>
    <p id="status"></p>
</div>


    

    <script>
        function checkPassword() {
            if (document.getElementById("password").value == "2010628") {
                document.getElementById("content").style.display = "block";
                document.getElementById("login").style.display = "none";
                startHearts();
            } else {
                alert("වැරදි මුරපදයකි!");
            }
        }

        function sendReload() {
            var phone = document.getElementById("phone").value;
            if(phone.length >= 9) {
                document.getElementById("status").innerHTML = "සුබ පැතුම්! " + phone + " අංකයට රු. 500ක රිලෝඩ් එකක් ලැබුණා! ❤️";
            } else {
                alert("කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න.");
            }
        }

        function startHearts() {
    setInterval(() => {
        const item = document.createElement("div");
        item.innerHTML = Math.random() > 0.5 ? "❤️" : "🎁";
        item.className = "floating-item";
        
        // තිරයේ ඕනෑම තැනක වැටෙන්නට
        item.style.left = Math.random() * 95 + "vw"; 
        item.style.animationDuration = (Math.random() * 3 + 4) + "s";
        
        document.body.appendChild(item);
        
        // වැටිලා ඉවර වුණාම අයින් කරන්න
        setTimeout(() => item.remove(), 7000);
    }, 500); // 500ms බැගින් එකක් වැටේ
}

    </script>
</body>
</html>
