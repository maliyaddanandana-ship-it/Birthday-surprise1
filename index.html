<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday!</title>
    <style>
        body { text-align: center; background: linear-gradient(to bottom, #ff9a9e, #fad0c4); color: white; font-family: 'Arial', sans-serif; padding: 20px; overflow-x: hidden; }
        .container { background: rgba(0, 0, 0, 0.2); padding: 20px; border-radius: 15px; display: inline-block; margin-top: 50px; }
        img { width: 80%; max-width: 300px; border-radius: 15px; border: 5px solid white; margin-bottom: 20px; }
        input { padding: 10px; width: 250px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; border: none; background-color: #ff4757; color: white; }
        
        .heart { position: absolute; top: -10px; color: red; font-size: 20px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>
</head>
<body>

    <div id="login">
        <h2>ආදරණීය, මේක ඔයා වෙනුවෙන්මයි! ❤️</h2>
        <input type="password" id="password" placeholder="මුරපදය ඇතුළත් කරන්න">
        <button onclick="checkPassword()">Open</button>
    </div>

    <div id="content" style="display:none;" class="container">
        <h1>Happy Birthday My Love! 🎂</h1>
        <img src="photo1.jpg" alt="Photo"> 
        <br>
        <audio controls autoplay><source src="song.mp3" type="audio/mpeg"></audio>
        
        <br><br>
        <h3>මෙන්න ඔයාට පොඩි තෑග්ගක්!</h3>
        <input type="text" id="phone" placeholder="ඔයාගේ දුරකථන අංකය">
        <button onclick="sendReload()">Reload ලබාගන්න</button>
        <p id="status"></p>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById("password").value == "2010112") {
                document.getElementById("content").style.display = "block";
                document.getElementById("login").style.display = "none";
                startHearts();
            } else {
                alert("වැරදි මුරපදයකි!");
            }
        }

        function sendReload() {
            var phone = document.getElementById("phone").value;
            if(phone.length >= 9) {
                document.getElementById("status").innerHTML = "සුබ පැතුම්! " + phone + " අංකයට රු. 500ක රිලෝඩ් එකක් ලැබුණා! ❤️";
            } else {
                alert("කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න.");
            }
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement("div");
                heart.innerHTML = "❤️";
                heart.className = "heart";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = Math.random() * 3 + 2 + "s";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
