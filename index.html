<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday!</title>
        <style>
        body { 
            text-align: center; 
            background-color: #000000; /* පසුබිම කළු පාටයි */
            color: #ffd700; /* අකුරු රන්වන් පාටයි */
            font-family: 'Arial', sans-serif; 
            padding: 20px; 
            overflow-x: hidden; 
        }
        .container { 
            background: rgba(255, 255, 255, 0.1); /* මදක් පාරදෘශ්‍ය සුදු පැහැති box එකක් */
            padding: 20px; 
            border-radius: 15px; 
            display: inline-block; 
            margin-top: 50px; 
            width: 90%; 
            max-width: 600px; 
            border: 1px solid #ffd700; /* වටේට රන්වන් පාටින් බෝඩර් එකක් */
        }
        h1, h2, h3 { color: #ffffff; } /* මාතෘකා සුදු පාටයි */
        img, video { 
            width: 100%; 
            max-width: 300px; 
            border-radius: 15px; 
            border: 3px solid #ffd700; /* පින්තූර වලට රන්වන් බෝඩර් */
            margin: 10px; 
        }
        input { padding: 10px; width: 250px; border-radius: 5px; border: 1px solid #ccc; }
        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 5px; 
            border: none; 
            background-color: #ff4757; 
            color: white; 
        }
        .heart { position: absolute; top: -10px; color: red; font-size: 20px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh); } }
    </style>

         
    
</head>
<body>

    <div id="login">
        <h2>ආදරණීය, මේක ඔයා වෙනුවෙන්මයි! ❤️</h2>
        <input type="password" id="password" placeholder="මුරපදය ඇතුළත් කරන්න">
        <button onclick="checkPassword()">Open</button>
    </div>

    <div id="content" style="display:none;" class="container">
        <h1>Happy Birthday My Love! 🎂</h1>
        
        <img src="IMG_20260528_030835_031304_edit_524787509273894.jpg" alt="Photo">
        <img src="photo2.jpg" alt="Photo">
        <img src="photo3.jpg" alt="Photo">
        <img src="photo4.jpg" alt="Photo">
        <img src="photo5.jpg" alt="Photo">
        <img src="photo6.jpg" alt="Photo">
        
        <br>
        <video controls><source src="video1.mp4" type="video/mp4"></video>
        <video controls><source src="video2.mp4" type="video/mp4"></video>
        
        <br>
        <audio controls autoplay><source src="song.mp3" type="audio/mpeg"></audio>
        
        <br><br>
        <h3>මෙන්න ඔයාට පොඩි තෑග්ගක්!</h3>
        <input type="text" id="phone" placeholder="ඔයාගේ දුරකථන අංකය">
        <button onclick="sendReload()">Reload ලබාගන්න</button>
        <p id="status"></p>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById("password").value == "2010112") {
                document.getElementById("content").style.display = "block";
                document.getElementById("login").style.display = "none";
                startHearts();
            } else {
                alert("වැරදි මුරපදයකි!");
            }
        }

        function sendReload() {
            var phone = document.getElementById("phone").value;
            if(phone.length >= 9) {
                document.getElementById("status").innerHTML = "සුබ පැතුම්! " + phone + " අංකයට රු. 500ක රිලෝඩ් එකක් ලැබුණා! ❤️";
            } else {
                alert("කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න.");
            }
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement("div");
                heart.innerHTML = "❤️";
                heart.className = "heart";
                heart.style.left = Math.random() * 100 + "vw";
                heart.style.animationDuration = Math.random() * 3 + 2 + "s";
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
