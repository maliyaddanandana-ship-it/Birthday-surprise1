<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday!</title>

    <meta charset="UTF-8">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div id="login">
        <h2>ආදරණීය, මේක ඔයා වෙනුවෙන්මයි! ❤️</h2>
        <input type="password" id="password" placeholder="මුරපදය ඇතුළත් කරන්න">
        <button onclick="checkPassword()">Open</button>
    </div>

<div id="content" style="display:none;" class="container">
    <h1>Happy Birthday My Love! 🎂</h1>
    
    <div class="gallery">
        <img src="IMG_20260528_030835_031304_edit_524787509273894.jpg" alt="Photo">
        <img src="download-2.jpeg" alt="Photo">
        <img src="IMG-20260610-WA0012.jpg" alt="Photo">
        <img src="IMG-20260611-WA0001.jpg" alt="Photo">
        <img src="photo5.jpg" alt="Photo">
        <img src="photo6.jpg" alt="Photo">
    </div>
    
    <div class="video-section">
        <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID" allowfullscreen></iframe>
        <p>මේ video එක අනිවාර්යයෙන්ම නරඹන්න!</p>
    </div>
    </div>


        
        <h3>මෙන්න ඔයාට පොඩි තෑග්ගක්!</h3>
        <input type="text" id="phone" placeholder="ඔයාගේ දුරකථන අංකය">
        <button onclick="sendReload()">Reload ලබාගන්න</button>
        <p id="status"></p>
    </div>

    <script>
        function checkPassword() {
            if (document.getElementById("password").value == "2010112") {
                document.getElementById("content").style.display = "block";
                document.getElementById("login").style.display = "none";
                startHearts();
            } else {
                alert("වැරදි මුරපදයකි!");
            }
        }

        function sendReload() {
            var phone = document.getElementById("phone").value;
            if(phone.length >= 9) {
                document.getElementById("status").innerHTML = "සුබ පැතුම්! " + phone + " අංකයට රු. 500ක රිලෝඩ් එකක් ලැබුණා! ❤️";
            } else {
                alert("කරුණාකර නිවැරදි අංකයක් ඇතුළත් කරන්න.");
            }
        }

        function startHearts() {
    setInterval(() => {
        const item = document.createElement("div");
        item.innerHTML = Math.random() > 0.5 ? "❤️" : "🎁"; // හාට් සහ තෑගි මාරුවෙන් මාරුවට
        item.className = "floating-item";
        item.style.left = Math.random() * 100 + "vw";
        item.style.animationDuration = Math.random() * 3 + 2 + "s";
        document.body.appendChild(item);
        setTimeout(() => item.remove(), 5000);
    }, 300);
}

    </script>
</body>
</html>
